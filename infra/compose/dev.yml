# Nébula · full dev stack (dev.yml)
# Extends the dependency stack and will add Nébula services (Atlas, Núcleo, apps)
# as they are built. For now it is exactly the deps stack.
#   docker compose -f infra/compose/dev.yml --env-file .env up -d

name: nebula-dev

include:
  - deps.yml

# Nébula services are added below as they come online, e.g.:
