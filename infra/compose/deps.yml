# Nébula · dependency stack (deps.yml)
# Brings up ONLY the infrastructure dependencies (no Nébula services).
#   docker compose -f infra/compose/deps.yml --env-file .env up -d
# Values come from .env (copy from .env.example). See infra/README.md for ports.

name: nebula-deps

x-restart: &restart
  restart: unless-stopped

networks:
  nebula:
    name: nebula

volumes:
  pg_data:
  redis_data:
  minio_data:
  meili_data:

services:
  postgres:
    <<: *restart
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nebula}
      POSTGRES_USER: ${POSTGRES_USER:-nebula}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    networks: [nebula]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    <<: *restart
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks: [nebula]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    <<: *restart
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-changeme}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      # Built-in KMS (no KES container) — enables SSE-S3 bucket auto-encryption.
      # Format: <key-name>:<base64 32-byte key>. Dev only; prod via Vault/KES.
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY:-nebula-key:3vqzQAmnI3kE8OHoSX1pALI7AJqe8OTykbIPGtf9uG8=}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    networks: [nebula]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    <<: *restart
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    networks: [nebula]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    <<: *restart
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    networks: [nebula]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    <<: *restart
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm", "--health-enabled=true"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-nebula}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8080:8080"   # auth
      - "9002:9000"   # management (health/metrics)
    volumes:
      - ../keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [nebula]
    healthcheck:
      # Quarkus image has no curl/wget; use bash /dev/tcp against the mgmt port.
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  traefik:
    <<: *restart
    image: traefik:v3.2
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"          # dev only — dashboard on :8081
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"   # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [nebula]
