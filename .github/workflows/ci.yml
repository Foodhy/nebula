name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  build-test:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Setup uv (Python)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python workspace
        run: uv sync

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      # Testcontainers (Postgres/NATS) run on the runner's Docker daemon. This
      # includes the MANDATORY cross-tenant isolation test (@nebula/db) and the
      # append-only audit test — they self-provision and gate the merge.
      - name: Test
        run: pnpm turbo run test

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Secrets (blocking) ---
      - name: gitleaks (secret scan)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --redact --no-banner --verbose

      # --- SAST (blocking) ---
      - name: Semgrep (SAST)
        run: |
          docker run --rm -v "$PWD:/src" semgrep/semgrep \
            semgrep scan --config=auto --error --skip-unknown-extensions /src

      # --- Vulnerabilities (blocking on HIGH/CRITICAL) ---
      - name: Trivy (filesystem / deps / config)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      # --- Dependency advisories (informational; advisories shift daily) ---
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
      - name: pip-audit
        run: |
          pipx run pip-audit || true
