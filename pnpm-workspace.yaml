# pnpm workspace definition.
# Empty dirs (no package.json) are ignored by pnpm until a package is added.
packages:
  - "apps/*/web"
  - "apps/*/bff"
  - "services/*"
  - "core/*"
  - "packages/*"
# Force-upgrade transitive deps to patched versions (CVE remediation, ADR/Trivy).
overrides:
  multer: "^2.2.0"
  glob: "^11.1.0"

allowBuilds:
  "@biomejs/biome": true
  "@nestjs/core": false
  cpu-features: false
  esbuild: true
  protobufjs: false
  ssh2: false
